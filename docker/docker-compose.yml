# Docker Compose for the RAG stack.
#
# Services:
#   base      — build target only; produces the rag-base image (no ports, no runtime)
#   serving   — always on; FastAPI RAG API on :8000
#   ui        — always on; Chainlit chat UI on :8080
#   ingestion — run on demand via --profile ingestion
#
# Usage:
#   docker compose -f docker/docker-compose.yml build base   # build shared base first
#   docker compose -f docker/docker-compose.yml up
#   docker compose -f docker/docker-compose.yml --profile ingestion run --rm ingestion

services:
  base:
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
    image: rag-base

  serving:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serving
    image: rag-serving
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      # Read the Chroma database written by the ingestion container.
      - ../.chroma:/app/.chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    image: rag-ui
    env_file: ../.env
    environment:
      - SERVING_URL=http://serving:8000
    ports:
      - "8080:8080"
    depends_on:
      - serving

  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestion
    image: rag-ingestion
    env_file: ../.env
    environment:
      - DO_NOT_TRACK=1
    profiles: [ingestion]
    volumes:
      - ../.chroma:/app/.chroma
      - ../versions.json:/app/versions.json
