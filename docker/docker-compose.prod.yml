# Production overlay — merged on top of docker-compose.yml during build/push.
# Pins all images to linux/amd64 as required by Cloud Run.
# Relies on QEMU being registered on the host to enable cross-compilation on
# arm64 machines. Run once if not already set up:
#   docker run --privileged --rm tonistiigi/binfmt --install all
# Never used for local development (use docker-compose.local.yml instead).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml build

services:
  base:
    platform: linux/amd64
  serving:
    platform: linux/amd64
  ui:
    platform: linux/amd64
  ingestion:
    platform: linux/amd64