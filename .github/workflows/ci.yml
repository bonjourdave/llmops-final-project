# CI pipeline: test → build → push on every push to main.
# PRs run unit tests only; image push only on merge to main.
# Human manually deploys after CI passes (make deploy-serving, etc.).
#
# Required GitHub secrets:
#   WORKLOAD_IDENTITY_PROVIDER  — full WIF provider resource name
#   GCP_PROJECT_ID              — GCP project ID (or set as repo variable)
#
# One-time GCP setup: run `make setup-wif GITHUB_REPO=owner/repo` once
# with owner-level gcloud credentials, then set the two secrets above.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/llmops-rag
  CI_SA: rag-ci-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - run: pytest tests/unit/ -v --tb=short

  # ── Build + push Docker images ───────────────────────────────────────────────
  build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.CI_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push rag-serving
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.serving
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/rag-serving:${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=serving
          cache-to: type=gha,mode=max,scope=serving

      - name: Build and push rag-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/rag-ui:${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Build and push rag-ingestion
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ingestion
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/rag-ingestion:${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion

      - name: Output deploy instructions
        run: |
          echo "Images pushed with tag: ${{ steps.sha.outputs.short }}"
          echo ""
          echo "To deploy:"
          echo "  make deploy-serving deploy-ui deploy-ingestion VERSION=${{ steps.sha.outputs.short }}"
