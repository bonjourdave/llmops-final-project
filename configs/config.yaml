project:
  name: llmops-final-project
  environment: local

paths:
  # Use your actual folders that already exist in your project
  raw_dir: dataraw
  processed_dir: dataprocessed

release:
  # Single source of truth for which release is "live"
  active_release_file: active_release.txt
  releases_dir: releases

embeddings:
  # Provider can be: local | openai
  provider: local
  local:
    model_name: sentence-transformers/all-MiniLM-L6-v2
  openai:
    model: text-embedding-3-small
    api_key_env: OPENAI_API_KEY

retrieval:
  top_k: 5

vectorstore:
  # store can be: faiss_flat | faiss_ivf (we'll implement both so you can A/B test)
  store: faiss_flat
  faiss_flat:
    metric: cosine
  faiss_ivf:
    metric: cosine
    nlist: 256

ab_testing:
  enabled: true
  # Two variants to compare (vector db / index configs)
  variants:
    - name: v1
      vectorstore: faiss_flat
      embedding_provider: local
    - name: v2
      vectorstore: faiss_ivf
      embedding_provider: local
  # 0.5 = 50/50 split
  traffic_split:
    v1: 0.5
    v2: 0.5
  # choose: random | sticky_hash
  routing: sticky_hash

monitoring:
  provider: langfuse
  langfuse:
    host: https://cloud.langfuse.com
    public_key_env: LANGFUSE_PUBLIC_KEY
    secret_key_env: LANGFUSE_SECRET_KEY

feedback_db:
  # SQLite file (local)
  path: data/feedback.sqlite